<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="cloudGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f87171"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="localGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle neural network pattern -->
  <g opacity="0.03" stroke="#fff" stroke-width="0.5">
    <circle cx="200" cy="150" r="80" fill="none"/>
    <circle cx="400" cy="300" r="60" fill="none"/>
    <circle cx="800" cy="200" r="100" fill="none"/>
    <circle cx="1000" cy="400" r="70" fill="none"/>
    <circle cx="600" cy="500" r="90" fill="none"/>
    <line x1="200" y1="150" x2="400" y2="300"/>
    <line x1="400" y1="300" x2="800" y2="200"/>
    <line x1="800" y1="200" x2="1000" y2="400"/>
    <line x1="600" y1="500" x2="400" y2="300"/>
    <line x1="600" y1="500" x2="1000" y2="400"/>
  </g>

  <!-- Left side: Cloud (dispersing/fading) -->
  <g transform="translate(300, 340)">
    <!-- Cloud icon outline -->
    <path d="M-60,-30 Q-60,-60 -30,-60 Q-20,-80 10,-75 Q40,-85 55,-60 Q80,-55 80,-30 Q90,-20 80,-5 L-60,-5 Q-75,-15 -60,-30Z"
          fill="none" stroke="#f87171" stroke-width="1.5" opacity="0.4"/>
    <!-- Dispersing dots (corrections floating away) -->
    <circle cx="-20" cy="-35" r="3" fill="#f87171" opacity="0.6">
      <animate attributeName="cy" values="-35;-120;-35" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0;0.6" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="10" cy="-40" r="2.5" fill="#f87171" opacity="0.5">
      <animate attributeName="cy" values="-40;-130;-40" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0;0.5" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="35" cy="-30" r="2" fill="#f87171" opacity="0.4">
      <animate attributeName="cy" values="-30;-110;-30" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0;0.4" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <text font-size="18" font-weight="600" fill="#f87171" text-anchor="middle" y="30" opacity="0.6">Cloud</text>
    <text font-size="13" fill="#94a3b8" text-anchor="middle" y="50" opacity="0.5">traces disperse</text>
  </g>

  <!-- Right side: Local (compounding/accumulating) -->
  <g transform="translate(900, 340)">
    <!-- Brain/chip icon -->
    <rect x="-45" y="-55" width="90" height="70" rx="8" fill="none" stroke="#34d399" stroke-width="1.5" opacity="0.7"/>
    <!-- Circuit lines inside -->
    <line x1="-30" y1="-40" x2="-30" y2="-10" stroke="#34d399" stroke-width="1" opacity="0.4"/>
    <line x1="-10" y1="-40" x2="-10" y2="-10" stroke="#34d399" stroke-width="1" opacity="0.4"/>
    <line x1="10" y1="-40" x2="10" y2="-10" stroke="#34d399" stroke-width="1" opacity="0.4"/>
    <line x1="30" y1="-40" x2="30" y2="-10" stroke="#34d399" stroke-width="1" opacity="0.4"/>
    <line x1="-35" y1="-25" x2="35" y2="-25" stroke="#34d399" stroke-width="1" opacity="0.4"/>
    <!-- Accumulating dots (corrections gathering) -->
    <circle cx="-20" cy="-30" r="3" fill="#34d399" opacity="0.8"/>
    <circle cx="5" cy="-35" r="2.5" fill="#34d399" opacity="0.7"/>
    <circle cx="25" cy="-20" r="3" fill="#34d399" opacity="0.9"/>
    <circle cx="-10" cy="-15" r="2" fill="#34d399" opacity="0.6"/>
    <circle cx="15" cy="-42" r="2" fill="#34d399" opacity="0.7"/>
    <!-- Pulsing ring -->
    <rect x="-55" y="-65" width="110" height="90" rx="12" fill="none" stroke="#34d399" stroke-width="1" opacity="0.15">
      <animate attributeName="opacity" values="0.15;0.05;0.15" dur="3s" repeatCount="indefinite"/>
    </rect>
    <text font-size="18" font-weight="600" fill="#34d399" text-anchor="middle" y="30">Local</text>
    <text font-size="13" fill="#94a3b8" text-anchor="middle" y="50">traces compound</text>
  </g>

  <!-- Center: You (the practitioner) -->
  <g transform="translate(600, 340)">
    <circle cx="0" cy="-25" r="35" fill="none" stroke="#8b5cf6" stroke-width="2" opacity="0.6" filter="url(#glow)"/>
    <text font-size="24" text-anchor="middle" y="-18">You</text>
    <!-- Arrows going both ways -->
    <!-- Left arrow (to cloud, fading) -->
    <line x1="-45" y1="-25" x2="-150" y2="-25" stroke="#f87171" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.3"/>
    <polygon points="-150,-31 -162,-25 -150,-19" fill="#f87171" opacity="0.3"/>
    <!-- Right arrow (to local, solid) -->
    <line x1="45" y1="-25" x2="150" y2="-25" stroke="#34d399" stroke-width="2" opacity="0.7"/>
    <polygon points="150,-31 162,-25 150,-19" fill="#34d399" opacity="0.7"/>
    <!-- Correction label -->
    <text font-size="11" fill="#94a3b8" text-anchor="middle" y="25" opacity="0.6">corrections</text>
  </g>

  <!-- Title -->
  <text font-size="44" font-weight="800" fill="#f8fafc" text-anchor="middle" x="600" y="85" letter-spacing="-0.5">
    Not Your Weights, Not Your Brain
  </text>

  <!-- Subtitle -->
  <text font-size="18" fill="#94a3b8" text-anchor="middle" x="600" y="125" font-style="italic">
    Your AI corrections are intellectual capital. Who captures the signal?
  </text>

  <!-- Bottom bar -->
  <rect x="0" y="540" width="1200" height="90" fill="#0a0a14" opacity="0.6"/>
  <line x1="0" y1="540" x2="1200" y2="540" stroke="#1e293b" stroke-width="1"/>

  <g transform="translate(200, 580)">
    <text font-size="28" font-weight="800" fill="#8b5cf6" text-anchor="middle">Karpathy</text>
    <text font-size="11" fill="#64748b" text-anchor="middle" y="18">exocortex framing</text>
  </g>

  <g transform="translate(450, 580)">
    <text font-size="28" font-weight="800" fill="#60a5fa" text-anchor="middle">Hinton</text>
    <text font-size="11" fill="#64748b" text-anchor="middle" y="18">dark knowledge</text>
  </g>

  <g transform="translate(700, 580)">
    <text font-size="28" font-weight="800" fill="#fbbf24" text-anchor="middle">Sutton</text>
    <text font-size="11" fill="#64748b" text-anchor="middle" y="18">bitter lesson (inverted)</text>
  </g>

  <g transform="translate(1000, 580)">
    <text font-size="28" font-weight="800" fill="#34d399" text-anchor="middle">Mollick</text>
    <text font-size="11" fill="#64748b" text-anchor="middle" y="18">skills as the edge</text>
  </g>

  <!-- Edge accents -->
  <rect x="0" y="0" width="4" height="630" fill="url(#localGrad)" opacity="0.3"/>
  <rect x="1196" y="0" width="4" height="630" fill="url(#localGrad)" opacity="0.3"/>
</svg>